<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>FitLock — Sweat to Scroll</title>
<meta name="description" content="Turn screen time addiction into fitness gains. Do pushups to unlock your apps." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💪%3C/text%3E%3C/svg%3E" />
<script src="https://cdn.tailwindcss.com"></script>

<style>
  * { -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    overscroll-behavior: none;
  }
  #root {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    background: #f8fafc;
    box-shadow: 0 0 60px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }
  @media (max-width: 430px) {
    #root { box-shadow: none; }
  }
  .animate-in { animation: fadeIn 0.3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .slide-up { animation: slideUp 0.3s ease-out; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .pulse-ring {
    animation: pulseRing 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
  }
  @keyframes pulseRing {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(249, 115, 22, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// Icon components using inline SVG
const Icon = ({ name, className = "w-5 h-5", fill = "none", strokeWidth = 2 }) => {

    CameraOff: <><line x1="2" x2="22" y1="2" y2="22"/><path d="M7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16"/><path d="M9.5 4h5L17 7h3a2 2 0 0 1 2 2v7.5"/><path d="M14.121 15.121A3 3 0 1 1 9.88 10.88"/></>,
    TreePine: <><path d="m17 14 3 3.3a1 1 0 0 1-.7 1.7H4.7a1 1 0 0 1-.7-1.7L7 14h-.3a1 1 0 0 1-.7-1.7L9 9h-.2A1 1 0 0 1 8 7.3L12 3l4 4.3a1 1 0 0 1-.8 1.7H15l3 3.3a1 1 0 0 1-.7 1.7H17z"/><path d="M12 22v-3"/></>,
    AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>,

    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
      {icons[name]}

};

function FitLockApp() {
  const [screen, setScreen] = useState('splash');
  const [tab, setTab] = useState('home');
  const [onboardStep, setOnboardStep] = useState(0);
  const [earnedMinutes, setEarnedMinutes] = useState(23);
  const [totalPushups, setTotalPushups] = useState(147);
  const [streak, setStreak] = useState(7);
  const [exerciseMode, setExerciseMode] = useState(null);
  const [repCount, setRepCount] = useState(0);
  const [isCounting, setIsCounting] = useState(false);
  const [showUnlockModal, setShowUnlockModal] = useState(false);
  const [selectedApp, setSelectedApp] = useState(null);

  // Profile state
  const [profileName, setProfileName] = useState('Champion');
  const [profileAvatar, setProfileAvatar] = useState('💪');
  const [profileAvatarImage, setProfileAvatarImage] = useState(null);
  const [profileLevel, setProfileLevel] = useState(7);
  const [profileXP, setProfileXP] = useState(2340);
  const [showEditProfile, setShowEditProfile] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [tempName, setTempName] = useState('');
  const [tempAvatar, setTempAvatar] = useState('');
  const [tempAvatarImage, setTempAvatarImage] = useState(null);

  // Settings state
  const [settings, setSettings] = useState({
    notifications: true,
    soundEffects: true,
    hapticFeedback: true,
    darkMode: false,
    appleHealth: true,
    strictMode: true,
    weeklyEmails: false,
    publicProfile: true,
    exerciseReminders: true,
    reminderTime: '18:00',
    dailyGoal: 50,
    language: 'English',
    units: 'Metric',
  });

  // Realistic calorie calculation: ~0.32 calories per pushup for average adult
  // Source: Harvard Medical School, ACSM guidelines
  const calculatedCalories = Math.round(totalPushups * 0.32);

  // Pose detection state
  const [cameraStatus, setCameraStatus] = useState('idle');
  const [modelStatus, setModelStatus] = useState('idle');
  const [feedback, setFeedback] = useState('');
  const [detectedConfidence, setDetectedConfidence] = useState(0);
  const [debugInfo, setDebugInfo] = useState({ angle: 0, state: 'ready', leftAngle: 0, rightAngle: 0 });
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const detectorRef = useRef(null);
  const animationRef = useRef(null);
  const poseStateRef = useRef('ready');
  const lastRepTimeRef = useRef(0);

  useEffect(() => {
    if (screen === 'splash') {
      const t = setTimeout(() => setScreen('onboard'), 2000);
      return () => clearTimeout(t);
    }
  }, [screen]);

  // Load TensorFlow.js MoveNet model when entering exercise mode
  useEffect(() => {
    if (!exerciseMode) return;

    const loadModel = async () => {
      setModelStatus('loading');
      setFeedback('Loading AI pose detection...');

      try {
        await window.tf.ready();
        try {
          await window.tf.setBackend('webgl');
        } catch (e) {
          await window.tf.setBackend('cpu');
        }

        const detector = await window.poseDetection.createDetector(
          window.poseDetection.SupportedModels.MoveNet,
          {
            modelType: window.poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING,
          }
        );

        detectorRef.current = detector;
        setModelStatus('ready');
        setFeedback('Model loaded! Enable camera to start.');
      } catch (err) {
        console.error('Model loading error:', err);
        setModelStatus('error');
        setFeedback('Failed to load AI model. You can still use demo mode below.');
      }
    };

    loadModel();

    return () => {
      if (animationRef.current) cancelAnimationFrame(animationRef.current);
      if (videoRef.current?.srcObject) {
        videoRef.current.srcObject.getTracks().forEach(track => track.stop());
      }
    };
  }, [exerciseMode]);

  const calculateAngle = (a, b, c) => {
    const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let angle = Math.abs(radians * 180 / Math.PI);
    if (angle > 180) angle = 360 - angle;
    return angle;
  };

  const startPoseDetection = async () => {
    if (!detectorRef.current) {
      setFeedback('Model not ready yet. Please wait...');
      return;
    }

    setCameraStatus('loading');
    setFeedback('Starting camera...');

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
        audio: false
      });

      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        await new Promise((resolve) => {
          videoRef.current.onloadedmetadata = () => {
            videoRef.current.play();
            resolve();
          };
        });
      }

      setCameraStatus('ready');
      setIsCounting(true);
      setFeedback('Get into pushup position...');
      poseStateRef.current = 'ready';
      detectPose();
    } catch (err) {
      console.error('Camera error:', err);
      setCameraStatus(err.name === 'NotAllowedError' ? 'denied' : 'error');
      setFeedback(err.name === 'NotAllowedError' ? 'Camera access denied.' : 'Could not access camera.');
    }
  };

  const detectPose = async () => {
    if (!videoRef.current || !detectorRef.current || !canvasRef.current) {
      animationRef.current = requestAnimationFrame(detectPose);
      return;
    }

    const video = videoRef.current;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');

    if (video.readyState !== 4) {
      animationRef.current = requestAnimationFrame(detectPose);
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    try {
      const poses = await detectorRef.current.estimatePoses(video);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (poses && poses.length > 0) {
        const keypoints = poses[0].keypoints;
        drawSkeleton(ctx, keypoints, canvas.width, canvas.height);

        // Get arm keypoints
        const leftShoulder = keypoints.find(k => k.name === 'left_shoulder');
        const leftElbow = keypoints.find(k => k.name === 'left_elbow');
        const leftWrist = keypoints.find(k => k.name === 'left_wrist');
        const rightShoulder = keypoints.find(k => k.name === 'right_shoulder');
        const rightElbow = keypoints.find(k => k.name === 'right_elbow');
        const rightWrist = keypoints.find(k => k.name === 'right_wrist');

        // LOWER threshold - just need to see arms
        const MIN_CONFIDENCE = 0.3;

        // Check which arm is visible (use whichever has better confidence)
        const leftArmVisible = leftShoulder && leftElbow && leftWrist &&
          leftShoulder.score > MIN_CONFIDENCE && leftElbow.score > MIN_CONFIDENCE && leftWrist.score > MIN_CONFIDENCE;
        const rightArmVisible = rightShoulder && rightElbow && rightWrist &&
          rightShoulder.score > MIN_CONFIDENCE && rightElbow.score > MIN_CONFIDENCE && rightWrist.score > MIN_CONFIDENCE;

        if (!leftArmVisible && !rightArmVisible) {
          setFeedback('👋 Show me your arm(s)');
          setDebugInfo({ angle: 0, state: poseStateRef.current, leftAngle: 0, rightAngle: 0 });
          animationRef.current = requestAnimationFrame(detectPose);
          return;
        }

        // Calculate angle - use whichever arm is visible
        let avgAngle = 0;
        let leftAngle = 0;
        let rightAngle = 0;

        if (leftArmVisible && rightArmVisible) {
          leftAngle = calculateAngle(leftShoulder, leftElbow, leftWrist);
          rightAngle = calculateAngle(rightShoulder, rightElbow, rightWrist);
          avgAngle = (leftAngle + rightAngle) / 2;
        } else if (leftArmVisible) {
          leftAngle = calculateAngle(leftShoulder, leftElbow, leftWrist);
          avgAngle = leftAngle;
        } else {
          rightAngle = calculateAngle(rightShoulder, rightElbow, rightWrist);
          avgAngle = rightAngle;
        }

        // Update debug info
        setDebugInfo({
          angle: Math.round(avgAngle),
          state: poseStateRef.current,
          leftAngle: Math.round(leftAngle),
          rightAngle: Math.round(rightAngle)
        });

        const now = Date.now();

        // SIMPLE rep detection:
        // UP position: arms straight (angle > 140°)
        // DOWN position: arms bent (angle < 100°)
        // Need UP -> DOWN -> UP for a rep

        if (avgAngle > 140) {
          // Arms are extended (UP position)
          if (poseStateRef.current === 'down') {
            // Just came back up from down = REP COMPLETE!
            if (now - lastRepTimeRef.current > 600) {
              setRepCount(r => r + 1);
              lastRepTimeRef.current = now;
              setFeedback('💪 Rep counted! Keep going!');
            }
            poseStateRef.current = 'up';
          } else {
            poseStateRef.current = 'up';
            setFeedback(`⬇️ Now bend your arms (angle: ${Math.round(avgAngle)}°)`);
          }
        } else if (avgAngle < 100) {
          // Arms are bent (DOWN position)
          poseStateRef.current = 'down';
          setFeedback(`⬆️ Now extend your arms (angle: ${Math.round(avgAngle)}°)`);
        } else {
          // In transition
          if (poseStateRef.current === 'up') {
            setFeedback(`⬇️ Bend more... (angle: ${Math.round(avgAngle)}°)`);
          } else if (poseStateRef.current === 'down') {
            setFeedback(`⬆️ Extend more... (angle: ${Math.round(avgAngle)}°)`);
          } else {
            setFeedback(`Extend your arms to start (angle: ${Math.round(avgAngle)}°)`);
          }
        }
      } else {
        setFeedback('👋 Position yourself in frame');
        setDebugInfo({ angle: 0, state: poseStateRef.current, leftAngle: 0, rightAngle: 0 });
      }
    } catch (err) {
      console.error('Detection error:', err);
    }

    animationRef.current = requestAnimationFrame(detectPose);
  };

  const drawSkeleton = (ctx, keypoints, width, height) => {
    // Only body connections - NO face connections
    const connections = [
      ['left_shoulder', 'right_shoulder'],
      ['left_shoulder', 'left_elbow'],
      ['left_elbow', 'left_wrist'],
      ['right_shoulder', 'right_elbow'],
      ['right_elbow', 'right_wrist'],
      ['left_shoulder', 'left_hip'],
      ['right_shoulder', 'right_hip'],
      ['left_hip', 'right_hip'],
      ['left_hip', 'left_knee'],
      ['left_knee', 'left_ankle'],
      ['right_hip', 'right_knee'],
      ['right_knee', 'right_ankle'],
    ];

    // Body keypoints only - exclude face (nose, eyes, ears)
    const bodyKeypoints = [
      'left_shoulder', 'right_shoulder',
      'left_elbow', 'right_elbow',
      'left_wrist', 'right_wrist',
      'left_hip', 'right_hip',
      'left_knee', 'right_knee',
      'left_ankle', 'right_ankle',
    ];

    ctx.save();
    ctx.scale(-1, 1);
    ctx.translate(-width, 0);

    ctx.strokeStyle = '#fb923c';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';

    connections.forEach(([a, b]) => {
      const pointA = keypoints.find(k => k.name === a);
      const pointB = keypoints.find(k => k.name === b);
      if (pointA && pointB && pointA.score > 0.3 && pointB.score > 0.3) {
        ctx.beginPath();
        ctx.moveTo(pointA.x, pointA.y);
        ctx.lineTo(pointB.x, pointB.y);
        ctx.stroke();
      }
    });

    // Only draw body keypoints, skip face
    keypoints.forEach(keypoint => {
      if (keypoint.score > 0.3 && bodyKeypoints.includes(keypoint.name)) {
        ctx.beginPath();
        ctx.arc(keypoint.x, keypoint.y, 6, 0, 2 * Math.PI);
        ctx.fillStyle = '#ef4444';
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    });

    ctx.restore();
  };

  const stopPoseDetection = () => {
    if (animationRef.current) cancelAnimationFrame(animationRef.current);
    if (videoRef.current?.srcObject) {
      videoRef.current.srcObject.getTracks().forEach(track => track.stop());
      videoRef.current.srcObject = null;
    }
    setCameraStatus('idle');
    setIsCounting(false);
  };

  const exitExercise = () => {
    stopPoseDetection();
    setExerciseMode(null);
    setRepCount(0);
    setFeedback('');
  };

  const blockedApps = [
    { name: 'Instagram', color: 'from-pink-500 to-purple-600', icon: '📷', locked: true, used: 12, limit: 30 },
    { name: 'TikTok', color: 'from-slate-900 to-slate-700', icon: '🎵', locked: true, used: 45, limit: 60 },

                      type="time"
                      value={settings.reminderTime}
                      onChange={(e) => setSettings(s => ({...s, reminderTime: e.target.value}))}
                      className="bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-semibold"
                    />
                  </div>

                  <div className="p-4">
                    <div className="flex items-center gap-3 mb-3">
                      <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                        <Icon name="Target" className="w-5 h-5 text-green-500" />
                      </div>
                      <div className="flex-1">
                        <p className="font-bold text-slate-900 text-sm">Daily Pushup Goal</p>
                        <p className="text-xs text-slate-500">{settings.dailyGoal} pushups per day</p>
                      </div>
                    </div>
                    <input
                      type="range"
                      min="10"
                      max="200"
                      step="10"
                      value={settings.dailyGoal}
                      onChange={(e) => setSettings(s => ({...s, dailyGoal: parseInt(e.target.value)}))}
                      className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-orange-500"
                    />
                    <div className="flex justify-between text-xs text-slate-400 mt-1 font-semibold">
                      <span>10</span>
                      <span className="text-orange-600 font-black">{settings.dailyGoal}</span>
                      <span>200</span>
                    </div>
                  </div>
                </div>
              </div>

              {/* Screen Time Controls */}
              <div>
                <label className="text-xs font-black text-slate-500 tracking-widest block mb-3">SCREEN TIME CONTROLS</label>
                <div className="bg-slate-50 rounded-2xl overflow-hidden">
                  {[
                    { key: 'strictMode', label: 'Strict Mode', icon: 'Lock', desc: "Can't unblock even if you delete the app" },
                    { key: 'appleHealth', label: 'Apple Health Sync', icon: 'Heart', desc: 'Share workouts with Health app' },
                  ].map((item, i, arr) => (
                    <div key={item.key} className={`flex items-center gap-3 p-4 ${i !== arr.length - 1 ? 'border-b border-slate-200' : ''}`}>
                      <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                        <Icon name={item.icon} className="w-5 h-5 text-slate-600" />
                      </div>
                      <div className="flex-1">
                        <p className="font-bold text-slate-900 text-sm">{item.label}</p>
                        <p className="text-xs text-slate-500">{item.desc}</p>
                      </div>
                      <button
                        onClick={() => setSettings(s => ({...s, [item.key]: !s[item.key]}))}
                        className={`w-12 h-7 rounded-full relative transition-colors ${settings[item.key] ? 'bg-gradient-to-r from-orange-500 to-red-600' : 'bg-slate-300'}`}
                      >
                        <div className={`absolute top-0.5 w-6 h-6 bg-white rounded-full shadow-md transition-all ${settings[item.key] ? 'right-0.5' : 'left-0.5'}`} />
                      </button>
                    </div>
                  ))}
                </div>
              </div>

              {/* Privacy */}
              <div>
                <label className="text-xs font-black text-slate-500 tracking-widest block mb-3">PRIVACY & SOCIAL</label>
                <div className="bg-slate-50 rounded-2xl overflow-hidden">
                  {[
                    { key: 'publicProfile', label: 'Public Profile', icon: 'User', desc: 'Show your stats to squad members' },
                    { key: 'weeklyEmails', label: 'Weekly Progress Email', icon: 'Bell', desc: 'Get summary every Monday' },
                  ].map((item, i, arr) => (
                    <div key={item.key} className={`flex items-center gap-3 p-4 ${i !== arr.length - 1 ? 'border-b border-slate-200' : ''}`}>
                      <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                        <Icon name={item.icon} className="w-5 h-5 text-slate-600" />
                      </div>
                      <div className="flex-1">
                        <p className="font-bold text-slate-900 text-sm">{item.label}</p>
                        <p className="text-xs text-slate-500">{item.desc}</p>
                      </div>
                      <button
                        onClick={() => setSettings(s => ({...s, [item.key]: !s[item.key]}))}
                        className={`w-12 h-7 rounded-full relative transition-colors ${settings[item.key] ? 'bg-gradient-to-r from-orange-500 to-red-600' : 'bg-slate-300'}`}
                      >
                        <div className={`absolute top-0.5 w-6 h-6 bg-white rounded-full shadow-md transition-all ${settings[item.key] ? 'right-0.5' : 'left-0.5'}`} />
                      </button>
                    </div>
                  ))}
                </div>
              </div>

              {/* General */}
              <div>
                <label className="text-xs font-black text-slate-500 tracking-widest block mb-3">GENERAL</label>
                <div className="bg-slate-50 rounded-2xl overflow-hidden">
                  <button className="w-full flex items-center gap-3 p-4 border-b border-slate-200 hover:bg-slate-100 transition-colors">
                    <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm text-xl">🌍</div>
                    <div className="flex-1 text-left">
                      <p className="font-bold text-slate-900 text-sm">Language</p>
                      <p className="text-xs text-slate-500">{settings.language}</p>
                    </div>
                    <Icon name="ChevronRight" className="w-4 h-4 text-slate-400" />
                  </button>

                  <button
                    onClick={() => setSettings(s => ({...s, units: s.units === 'Metric' ? 'Imperial' : 'Metric'}))}
                    className="w-full flex items-center gap-3 p-4 border-b border-slate-200 hover:bg-slate-100 transition-colors"
                  >
                    <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm text-xl">📏</div>
                    <div className="flex-1 text-left">
                      <p className="font-bold text-slate-900 text-sm">Units</p>
                      <p className="text-xs text-slate-500">{settings.units === 'Metric' ? 'kg, cm' : 'lbs, inches'}</p>
                    </div>
                    <Icon name="ChevronRight" className="w-4 h-4 text-slate-400" />
                  </button>

                  <button className="w-full flex items-center gap-3 p-4 hover:bg-slate-100 transition-colors">
                    <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm text-xl">📱</div>
                    <div className="flex-1 text-left">
                      <p className="font-bold text-slate-900 text-sm">App Version</p>
                      <p className="text-xs text-slate-500">v1.0.0 (Build 100)</p>
                    </div>
                  </button>
                </div>
              </div>

              {/* Support */}
              <div>
                <label className="text-xs font-black text-slate-500 tracking-widest block mb-3">SUPPORT</label>
                <div className="bg-slate-50 rounded-2xl overflow-hidden">
                  {[
                    { icon: '❓', label: 'Help Center', desc: 'FAQs and tutorials' },
                    { icon: '💬', label: 'Contact Us', desc: 'support@fitlock.app' },
                    { icon: '⭐', label: 'Rate App', desc: 'Love FitLock? Tell us!' },
                    { icon: '📄', label: 'Terms of Service', desc: 'Read our terms' },
                    { icon: '🔒', label: 'Privacy Policy', desc: 'How we handle your data' },
                  ].map((item, i, arr) => (
                    <button key={item.label} className={`w-full flex items-center gap-3 p-4 ${i !== arr.length - 1 ? 'border-b border-slate-200' : ''} hover:bg-slate-100 transition-colors`}>
                      <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm text-xl">{item.icon}</div>
                      <div className="flex-1 text-left">
                        <p className="font-bold text-slate-900 text-sm">{item.label}</p>
                        <p className="text-xs text-slate-500">{item.desc}</p>
                      </div>
                      <Icon name="ChevronRight" className="w-4 h-4 text-slate-400" />
                    </button>
                  ))}
                </div>
              </div>

              {/* Account */}
              <div>
                <label className="text-xs font-black text-slate-500 tracking-widest block mb-3">ACCOUNT</label>
                <div className="bg-slate-50 rounded-2xl overflow-hidden mb-3">
                  <button className="w-full flex items-center gap-3 p-4 hover:bg-slate-100 transition-colors">
                    <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                      <Icon name="ArrowLeft" className="w-5 h-5 text-slate-600" />
                    </div>
                    <div className="flex-1 text-left">
                      <p className="font-bold text-slate-900 text-sm">Log Out</p>
                      <p className="text-xs text-slate-500">Sign out of your account</p>
                    </div>
                  </button>
                </div>

                <button className="w-full p-4 bg-red-50 text-red-600 font-bold rounded-2xl hover:bg-red-100 transition-colors">
                  Delete Account
                </button>
                <p className="text-xs text-slate-400 text-center mt-2">This action is permanent</p>
              </div>

              {/* Made with love footer */}
              <div className="text-center pt-4 pb-8">
                <p className="text-xs text-slate-400">Made with 💪 by FitLock</p>
                <p className="text-[10px] text-slate-300 mt-1">© 2026 FitLock Inc.</p>
              </div>
            </div>
          </div>
        </div>
      )}

      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100" style={{maxWidth:'430px',margin:'0 auto'}}>
        <div className="flex items-center justify-around py-2 px-2">
          {[
            { id: 'home', iconName: 'Home', label: 'Home' },
            { id: 'stats', iconName: 'BarChart3', label: 'Stats' },
            { id: 'squad', iconName: 'Users', label: 'Squad' },
            { id: 'profile', iconName: 'User', label: 'Profile' },
          ].map((item) => (
            <button key={item.id} onClick={() => setTab(item.id)} className={`flex flex-col items-center gap-1 px-4 py-2 rounded-xl transition-all ${tab === item.id ? 'text-orange-600' : 'text-slate-400'}`}>
              <Icon name={item.iconName} className="w-5 h-5" strokeWidth={tab === item.id ? 2.5 : 2} />
              <p className="text-[10px] font-bold tracking-wide">{item.label}</p>
            </button>
          ))}
        </div>
      </div>

      {tab === 'home' && (
        <button onClick={() => setExerciseMode(exercises[0])} className="fixed bottom-20 right-4 w-14 h-14 bg-gradient-to-br from-orange-500 to-red-600 rounded-full shadow-2xl flex items-center justify-center active:scale-95 transition-transform z-40" style={{right:'calc(50% - 211px)'}}>
          <Icon name="Zap" className="w-6 h-6 text-white" fill="white" />
        </button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FitLockApp />);
</script>
</body>
</html>

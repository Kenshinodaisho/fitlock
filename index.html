<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>FitLock — Sweat to Scroll</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💪%3C/text%3E%3C/svg%3E"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;overscroll-behavior:none}
#root{max-width:430px;margin:0 auto;min-height:100vh;background:#f8fafc;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.4)}
@media(max-width:430px){#root{box-shadow:none}}

/* Dark mode overrides */
body.dark-mode #root{background:#0f172a;}
body.dark-mode .dm-bg{background:#1e293b!important;}
body.dark-mode .dm-bg-deep{background:#0f172a!important;}
body.dark-mode .dm-bg-card{background:#1e293b!important;}
body.dark-mode .dm-text{color:#f1f5f9!important;}
body.dark-mode .dm-text-muted{color:#94a3b8!important;}
body.dark-mode .dm-border{border-color:#334155!important;}
body.dark-mode .dm-surface{background:#334155!important;}
body.dark-mode .dm-input{background:#334155!important;border-color:#475569!important;color:#f1f5f9!important;}
body.dark-mode .dm-input::placeholder{color:#64748b!important;}
body.dark-mode .dm-tab-bar{background:#1e293b!important;border-color:#334155!important;}
body.dark-mode .dm-tab-inactive{color:#64748b!important;}
body.dark-mode .dm-section-label{color:#94a3b8!important;}
body.dark-mode .dm-chevron{color:#475569!important;}
body.dark-mode .dm-badge-bg{background:#334155!important;}
body.dark-mode .dm-settings-bg{background:#0f172a!important;}
body.dark-mode .dm-settings-header{background:#1e293b!important;border-color:#334155!important;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef}=React;

/* ── SVG Exercise Icons ── */
const SvgIcon=({children,s=24})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{children}</svg>;
const Ico=({n,s=24})=>{
  if(n==="Pushups")return<SvgIcon s={s}><circle cx="12" cy="5" r="2"/><path d="M8 12h8"/><path d="M8 12V9a4 4 0 0 1 8 0v3"/><path d="M6 12v5"/><path d="M18 12v5"/><path d="M6 17h12"/></SvgIcon>;
  if(n==="Squats")return<SvgIcon s={s}><circle cx="12" cy="4" r="2"/><path d="M12 6v4"/><path d="M8 10l4 2 4-2"/><path d="M8 10l-2 6"/><path d="M16 10l2 6"/></SvgIcon>;
  if(n==="Jumping Jacks")return<SvgIcon s={s}><circle cx="12" cy="4" r="2"/><path d="M12 6v5"/><path d="M5 8l7 3 7-3"/><path d="M10 17l2 3 2-3"/><path d="M12 11v6"/></SvgIcon>;
  if(n==="Plank")return<SvgIcon s={s}><circle cx="18" cy="7" r="2"/><path d="M4 14h14a2 2 0 0 0 0-4H8L4 14z"/><path d="M4 14v3"/></SvgIcon>;
  if(n==="Burpees")return<SvgIcon s={s}><circle cx="12" cy="3" r="2"/><path d="M12 5v5"/><path d="M9 7l-3 3"/><path d="M15 7l3 3"/><path d="M12 10l-3 5h6l-3-5z"/></SvgIcon>;
  if(n==="Lunges")return<SvgIcon s={s}><circle cx="9" cy="4" r="2"/><path d="M9 6v4"/><path d="M6 10l3 2 5-2"/><path d="M9 12l-2 8"/><path d="M14 10l2 10"/></SvgIcon>;
  if(n==="Sit-ups")return<SvgIcon s={s}><circle cx="12" cy="5" r="2"/><path d="M4 20h16"/><path d="M8 20l4-8 4 4"/><path d="M12 12V7"/></SvgIcon>;
  if(n==="Mountain Climbers")return<SvgIcon s={s}><circle cx="18" cy="6" r="2"/><path d="M3 18l6-6 3 2 5-8"/><path d="M21 18H3"/></SvgIcon>;
  if(n==="High Knees")return<SvgIcon s={s}><circle cx="12" cy="4" r="2"/><path d="M12 6v4"/><path d="M9 10h6"/><path d="M9 10l-2 10"/><path d="M15 10l1 5-3 2"/></SvgIcon>;
  if(n==="Jump Rope")return<SvgIcon s={s}><circle cx="12" cy="4" r="2"/><path d="M12 6v3"/><path d="M5 10c0 4 3 5 7 5s7-1 7-5"/><path d="M9 15l-1 5"/><path d="M15 15l1 5"/></SvgIcon>;
  if(n==="Pull-ups")return<SvgIcon s={s}><line x1="3" y1="3" x2="21" y2="3"/><circle cx="12" cy="9" r="2"/><path d="M9 3v3l3 3 3-3V3"/><path d="M12 11v9"/></SvgIcon>;
  if(n==="Dips")return<SvgIcon s={s}><path d="M5 5v12"/><path d="M19 5v12"/><circle cx="12" cy="9" r="2"/><path d="M9 5l3 4 3-4"/><path d="M12 11v8"/></SvgIcon>;
  return<SvgIcon s={s}><circle cx="12" cy="12" r="9"/></SvgIcon>;
};

const EXERCISES=[
  {name:"Pushups",rate:"1 rep = 1 min",color:"from-orange-500 to-red-500"},
  {name:"Squats",rate:"2 reps = 1 min",color:"from-blue-500 to-indigo-600"},
  {name:"Jumping Jacks",rate:"3 reps = 1 min",color:"from-green-500 to-emerald-600"},
  {name:"Plank",rate:"10 sec = 1 min",color:"from-purple-500 to-pink-600"},
  {name:"Burpees",rate:"1 rep = 2 min",color:"from-red-500 to-rose-600"},
  {name:"Lunges",rate:"2 reps = 1 min",color:"from-yellow-500 to-orange-500"},
  {name:"Sit-ups",rate:"2 reps = 1 min",color:"from-teal-500 to-cyan-600"},
  {name:"Mountain Climbers",rate:"3 reps = 1 min",color:"from-slate-500 to-slate-700"},
  {name:"High Knees",rate:"4 reps = 1 min",color:"from-pink-500 to-rose-500"},
  {name:"Jump Rope",rate:"10 reps = 1 min",color:"from-violet-500 to-purple-600"},
  {name:"Pull-ups",rate:"1 rep = 2 min",color:"from-amber-500 to-yellow-600"},
  {name:"Dips",rate:"1 rep = 1 min",color:"from-sky-500 to-blue-600"},
];

const APPS=[
  {name:"Instagram",color:"from-pink-500 to-purple-600",icon:"📷",locked:true,used:0,limit:30},
  {name:"TikTok",color:"from-slate-900 to-slate-700",icon:"🎵",locked:true,used:0,limit:60},
  {name:"YouTube",color:"from-red-500 to-red-700",icon:"▶️",locked:false,used:0,limit:45},
  {name:"X (Twitter)",color:"from-slate-800 to-black",icon:"𝕏",locked:true,used:0,limit:20},
  {name:"Reddit",color:"from-orange-500 to-red-600",icon:"🔶",locked:false,used:0,limit:30},
  {name:"Snapchat",color:"from-yellow-400 to-yellow-500",icon:"👻",locked:true,used:0,limit:15},
];

const PUZZLES=[
  {type:"arithmetic",q:"If you have 3 apples, buy 4 more, then give away 2, how many do you have?",a:"5",hint:"Think step by step",d:1,min:3},
  {type:"arithmetic",q:"A train travels 60 km/h. How far does it travel in 45 minutes?",a:"45",hint:"45 min = 0.75 hours",d:2,min:4},
  {type:"arithmetic",q:"What is 15% of 240?",a:"36",hint:"10% = 24, 5% = 12",d:2,min:4},
  {type:"arithmetic",q:"A shirt costs $80 after a 20% discount. What was the original price?",a:"100",hint:"80 = 80% of original",d:2,min:4},
  {type:"sequence",q:"What comes next? 2, 4, 8, 16, __",a:"32",hint:"Each number doubles",d:1,min:3},
  {type:"sequence",q:"What comes next? 1, 1, 2, 3, 5, 8, __",a:"13",hint:"Each = sum of previous two",d:2,min:4},
  {type:"spatial",q:"A cube has 6 faces. How many edges does it have?",a:"12",hint:"Each face has 4 edges but shared",d:2,min:4},
  {type:"spatial",q:"How many squares in a 3x3 grid? Count all sizes.",a:"14",hint:"9 small + 4 medium + 1 large",d:3,min:5},
  {type:"reasoning",q:"A bat and ball cost $1.10. The bat costs $1 more. How much is the ball in cents?",a:"5",hint:"Don't say 10!",d:2,min:5},
  {type:"reasoning",q:"If A > B and B > C, is A always > C? (yes/no)",a:"yes",hint:"Transitive property",d:1,min:3},
  {type:"pattern",q:"ABACABA — what letter comes next?",a:"C",hint:"Look at structure A-B-A-C-A-B-A",d:2,min:4},
];

const AVATARS=["💪","🔥","⚡","🎯","🚀","👑","🏆","🥊","🏋️","🧘","🦁","🐺","🦅","🐉","⚔️","🛡️","💎","🌟"];

function App(){
  const [screen,setScreen]=useState("splash");
  const [tab,setTab]=useState("home");
  const [step,setStep]=useState(0);
  const [mins,setMins]=useState(0);
  const [pushups,setPushups]=useState(0);
  const [streak,setStreak]=useState(0);
  const [ex,setEx]=useState(null);
  const [reps,setReps]=useState(0);
  const [counting,setCounting]=useState(false);
  const [showUnlock,setShowUnlock]=useState(false);
  const [selApp,setSelApp]=useState(null);
  const [name,setName]=useState("Champion");
  const [avatar,setAvatar]=useState("💪");
  const [bio,setBio]=useState("");
  const [goal,setGoal]=useState("");
  const [showEdit,setShowEdit]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showSupport,setShowSupport]=useState(false);
  const [supportPage,setSupportPage]=useState(null);
  const [tName,setTName]=useState("");
  const [tAvatar,setTAvatar]=useState("");
  const [cfg,setCfg]=useState({notifs:true,sound:true,haptic:true,dark:false,health:true,strict:true,reminders:true,goal:50});
  const [puzzleMode,setPuzzleMode]=useState(false);
  const [puzzle,setPuzzle]=useState(null);
  const [ans,setAns]=useState("");
  const [result,setResult]=useState(null);
  const [solved,setSolved]=useState(0);
  const [camStatus,setCamStatus]=useState("idle");
  const [angle,setAngle]=useState(0);
  const [starRating,setStarRating]=useState(0);
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const detRef=useRef(null);
  const animRef=useRef(null);
  const poseRef=useRef("ready");
  const lastRepRef=useRef(0);
  const demoRef=useRef(null);

  // Apply dark mode to body
  useEffect(()=>{
    if(cfg.dark){document.body.classList.add("dark-mode");}
    else{document.body.classList.remove("dark-mode");}
  },[cfg.dark]);

  // Haptic feedback helper
  const haptic=(dur=10)=>{
    if(cfg.haptic&&navigator.vibrate)navigator.vibrate(dur);
  };

  // Sound helper (uses Web Audio API)
  const playSound=(type)=>{
    if(!cfg.sound)return;
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      if(type==="rep"){o.frequency.value=660;g.gain.setValueAtTime(0.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);o.start();o.stop(ctx.currentTime+0.15);}
      else if(type==="claim"){o.frequency.value=523;g.gain.setValueAtTime(0.2,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(1046,ctx.currentTime+0.3);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);o.start();o.stop(ctx.currentTime+0.4);}
    }catch{}
  };

  const cal=Math.round(pushups*0.32);
  const trees=Math.floor(pushups/1000);
  const treesPend=((pushups%1000)/1000).toFixed(2);

  useEffect(()=>{
    if(screen==="splash"){const t=setTimeout(()=>setScreen("onboard"),2000);return()=>clearTimeout(t);}
  },[screen]);

  useEffect(()=>{
    if(!ex){cleanup();return;}
    setCamStatus("loading");poseRef.current="ready";setAngle(0);
    (async()=>{
      try{
        if(!window.tf)await load("https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.20.0/tf.min.js");
        if(!window.poseDetection)await load("https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js");
        await window.tf.ready();
        try{await window.tf.setBackend("webgl");}catch{await window.tf.setBackend("cpu");}
        detRef.current=await window.poseDetection.createDetector(window.poseDetection.SupportedModels.MoveNet,{modelType:window.poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING});
        setCamStatus("ready");
      }catch(e){setCamStatus("error");}
    })();
    return()=>cleanup();
  },[ex]);

  const load=src=>new Promise((res,rej)=>{const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});

  const cleanup=()=>{
    if(animRef.current)cancelAnimationFrame(animRef.current);
    if(demoRef.current)clearInterval(demoRef.current);
    if(videoRef.current?.srcObject){videoRef.current.srcObject.getTracks().forEach(t=>t.stop());videoRef.current.srcObject=null;}
    setCamStatus("idle");setCounting(false);
  };

  const startCam=async()=>{
    if(!detRef.current)return;
    setCamStatus("starting");
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:false});
      videoRef.current.srcObject=stream;
      await new Promise(res=>{videoRef.current.onloadedmetadata=()=>{videoRef.current.play();res();};});
      setCamStatus("active");setCounting(true);loop();
    }catch(e){setCamStatus(e.name==="NotAllowedError"?"denied":"error");}
  };

  const stopCam=()=>{
    if(animRef.current)cancelAnimationFrame(animRef.current);
    if(videoRef.current?.srcObject){videoRef.current.srcObject.getTracks().forEach(t=>t.stop());videoRef.current.srcObject=null;}
    setCamStatus("ready");setCounting(false);
  };

  const ang=(a,b,c)=>{let r=Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x);let d=Math.abs(r*180/Math.PI);return d>180?360-d:d;};

  const loop=async()=>{
    if(!videoRef.current||!detRef.current||!canvasRef.current){animRef.current=requestAnimationFrame(loop);return;}
    const v=videoRef.current,c=canvasRef.current,ctx=c.getContext("2d");
    if(v.readyState!==4){animRef.current=requestAnimationFrame(loop);return;}
    c.width=v.videoWidth;c.height=v.videoHeight;
    try{
      const poses=await detRef.current.estimatePoses(v);
      ctx.clearRect(0,0,c.width,c.height);
      if(poses?.length){
        const kps=poses[0].keypoints;
        drawSkel(ctx,kps,c.width,c.height);
        const ls=kps.find(k=>k.name==="left_shoulder"),le=kps.find(k=>k.name==="left_elbow"),lw=kps.find(k=>k.name==="left_wrist");
        const rs=kps.find(k=>k.name==="right_shoulder"),re=kps.find(k=>k.name==="right_elbow"),rw=kps.find(k=>k.name==="right_wrist");
        const lOk=ls&&le&&lw&&ls.score>.3&&le.score>.3&&lw.score>.3;
        const rOk=rs&&re&&rw&&rs.score>.3&&re.score>.3&&rw.score>.3;
        if(lOk||rOk){
          let avg=lOk&&rOk?(ang(ls,le,lw)+ang(rs,re,rw))/2:lOk?ang(ls,le,lw):ang(rs,re,rw);
          setAngle(Math.round(avg));
          const now=Date.now();
          if(avg>140&&poseRef.current==="down"&&now-lastRepRef.current>700){setReps(r=>r+1);lastRepRef.current=now;poseRef.current="up";playSound("rep");haptic(15);}
          else if(avg<100&&poseRef.current!=="down")poseRef.current="down";
          else if(avg>140&&poseRef.current==="ready")poseRef.current="up";
        }
      }
    }catch{}
    animRef.current=requestAnimationFrame(loop);
  };

  const drawSkel=(ctx,kps,w,h)=>{
    const conns=[["left_shoulder","right_shoulder"],["left_shoulder","left_elbow"],["left_elbow","left_wrist"],["right_shoulder","right_elbow"],["right_elbow","right_wrist"],["left_shoulder","left_hip"],["right_shoulder","right_hip"],["left_hip","right_hip"],["left_hip","left_knee"],["left_knee","left_ankle"],["right_hip","right_knee"],["right_knee","right_ankle"]];
    const body=["left_shoulder","right_shoulder","left_elbow","right_elbow","left_wrist","right_wrist","left_hip","right_hip","left_knee","right_knee","left_ankle","right_ankle"];
    ctx.save();ctx.scale(-1,1);ctx.translate(-w,0);
    ctx.strokeStyle="#fb923c";ctx.lineWidth=4;ctx.lineCap="round";
    conns.forEach(([a,b])=>{const pa=kps.find(k=>k.name===a),pb=kps.find(k=>k.name===b);if(pa&&pb&&pa.score>.3&&pb.score>.3){ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();}});
    kps.forEach(k=>{if(k.score>.3&&body.includes(k.name)){ctx.beginPath();ctx.arc(k.x,k.y,6,0,2*Math.PI);ctx.fillStyle="#ef4444";ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();}});
    ctx.restore();
  };

  const startDemo=()=>{setCamStatus("demo");setCounting(true);demoRef.current=setInterval(()=>{setReps(r=>{if(r>=10){clearInterval(demoRef.current);setCounting(false);return r;}playSound("rep");haptic(15);return r+1;});},800);};

  const claim=()=>{cleanup();setMins(m=>m+reps);setPushups(p=>p+reps);setStreak(s=>s+1);setEx(null);setReps(0);playSound("claim");haptic(50);};

  const rndP=(type)=>{const pool=type?PUZZLES.filter(p=>p.type===type):PUZZLES;return pool[Math.floor(Math.random()*pool.length)];};

  const checkAns=()=>{const ok=ans.trim().toLowerCase()===puzzle.a.toString().toLowerCase();setResult(ok?"correct":"wrong");if(ok)setSolved(n=>n+1);};

  const share=()=>{const url="https://fitlock-five.vercel.app";const txt="Join me on FitLock! Do pushups to unlock your apps.\n\n"+url;if(navigator.share)navigator.share({title:"FitLock",text:txt,url});else{navigator.clipboard.writeText(txt);alert("Link copied!\n"+url);}};

  const Tog=({k})=><button onClick={()=>setCfg(c=>({...c,[k]:!c[k]}))} className={`w-12 h-7 rounded-full relative transition-colors ${cfg[k]?"bg-orange-500":"bg-slate-300"}`}><div className={`absolute top-0.5 w-6 h-6 bg-white rounded-full shadow transition-all ${cfg[k]?"right-0.5":"left-0.5"}`}/></button>;

  /* ── SCREENS ── */
  if(screen==="splash")return(
    <div className="w-full min-h-screen bg-gradient-to-br from-orange-500 via-red-500 to-pink-600 flex items-center justify-center">
      <div className="text-center">
        <div className="w-24 h-24 mx-auto mb-4 bg-white/20 rounded-3xl flex items-center justify-center">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14.4 14.4 9.6 9.6M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829zM21.5 21.5l-1.4-1.4M3.9 3.9 2.5 2.5M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z"/></svg>
        </div>
        <h1 className="text-5xl font-black text-white">FitLock</h1>
        <p className="text-white/90 font-semibold mt-2 tracking-wide">SWEAT TO SCROLL</p>
      </div>
    </div>
  );

  if(screen==="onboard"){
    const steps=[
      {icon:"🔥",title:"You are losing 9+ years",sub:"The average person spends 5-6 hours daily on their phone. That is nearly a decade of your life, gone.",cta:"Shocking",bg:"from-orange-50 to-red-50"},
      {icon:"💪",title:"Trade pushups for scrolls",sub:"Want to open TikTok? Earn it. Every rep unlocks a minute.",cta:"I am ready",bg:"from-red-50 to-pink-50"},
      {icon:"👥",title:"Join your Squad",sub:"Compete with friends, share streaks, keep each other accountable.",cta:"Count me in",bg:"from-indigo-50 to-purple-50"},
      {icon:"✨",title:"Start your transformation",sub:"In 90 days, you could lose screen time addiction and gain visible muscle.",cta:"Begin journey",bg:"from-emerald-50 to-teal-50"},
    ];
    const s=steps[step];
    return(
      <div className={`w-full min-h-screen bg-gradient-to-br ${s.bg} flex flex-col p-6`}>
        <div className="flex items-center justify-between pt-4">
          <button onClick={()=>step>0?setStep(step-1):setScreen("splash")} className="w-10 h-10 bg-white/80 rounded-full flex items-center justify-center text-xl">←</button>
          <div className="flex gap-2">{steps.map((_,i)=><div key={i} className={`h-1.5 rounded-full transition-all ${i===step?"w-8 bg-slate-900":"w-1.5 bg-slate-300"}`}/>)}</div>
          <button onClick={()=>setScreen("main")} className="text-sm text-slate-500">Skip</button>
        </div>
        <div className="flex-1 flex flex-col items-center justify-center text-center">
          <div className="mb-8 bg-white rounded-3xl p-8 shadow-xl text-7xl">{s.icon}</div>
          <h1 className="text-4xl font-black text-slate-900 mb-4 leading-tight">{s.title}</h1>
          <p className="text-lg text-slate-600 max-w-sm leading-relaxed">{s.sub}</p>
        </div>
        <button onClick={()=>{if(step<steps.length-1)setStep(step+1);else setScreen("main");}} className="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-2">
          {s.cta} →
        </button>
      </div>
    );
  }

  if(showSupport){
    const pages={
      "Help Center":<div className="space-y-4">{[
        {q:"How do I earn screen time?",a:"Complete exercises or mind puzzles. Each rep or solved puzzle earns you minutes."},
        {q:"How does pose detection work?",a:"FitLock uses your camera with AI to count reps. Nothing is recorded — all processing happens on your device."},
        {q:"Why won't the camera work?",a:"Allow camera permission in browser settings, then try again."},

                  <div key={i} className="flex-1 flex flex-col items-center gap-2">

                <div className="bg-white/15 rounded-xl p-3 text-center"><p className="text-2xl font-black text-white">{streak}d</p><p className="text-xs text-white/80">Streak</p></div>

              </div>
            </div>
            <button onClick={share} className="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-black py-4 rounded-2xl flex items-center justify-center gap-2">+ Invite Friends</button>
          </div>
        </div>
      )}

      {tab==="profile"&&(
        <div className="pb-24">
          <div className="bg-gradient-to-br from-slate-900 to-slate-700 px-6 pt-12 pb-20 rounded-b-[2.5rem]">
            <div className="flex items-center justify-between">
              <h1 className="text-2xl font-black text-white">Profile</h1>
              <button onClick={()=>setShowSettings(true)} className="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-white text-xl">⚙️</button>
            </div>
          </div>
          <div className="px-6 -mt-14">
            <div className="bg-white rounded-2xl p-5 shadow-xl text-center mb-4 dm-bg-card">
              <div className="w-20 h-20 mx-auto bg-gradient-to-br from-orange-500 to-red-600 rounded-full flex items-center justify-center text-4xl shadow-xl -mt-14 mb-3 border-4 border-white">{avatar}</div>

              {bio&&<p className="text-xs text-slate-400 dm-text-muted mt-1 italic">{bio}</p>}
              {goal&&<div className="mt-2 inline-block bg-orange-100 text-orange-700 text-xs font-bold px-3 py-1 rounded-full">{goal}</div>}
              <div className="mt-4 h-2 bg-slate-100 rounded-full overflow-hidden dm-surface"><div className="h-full bg-gradient-to-r from-orange-500 to-red-600 rounded-full" style={{width:"5%"}}/></div>
              <button onClick={()=>{setTName(name);setTAvatar(avatar);setShowEdit(true);}} className="mt-4 w-full bg-slate-100 text-slate-700 dm-surface dm-text font-bold py-2.5 rounded-xl flex items-center justify-center gap-2">⚙️ Edit Profile</button>

              <div className="grid grid-cols-4 gap-3">{["🔥","💪","⚡","🎯","🌟","🏅","👑","🔒"].map((e,i)=><div key={i} className={`aspect-square rounded-xl flex items-center justify-center text-2xl ${i<(pushups>0?1:0)?"bg-yellow-100":"bg-slate-100 dm-surface opacity-40"}`}>{e}</div>)}</div>
